<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Modern Chat Interface</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <style data-purpose="chat-sample-bootstrap-overrides">
        :root {
            --usg-navy: #1E174A;
            --usg-navy-light: #2a2166;
            --usg-surface: #f8fafc;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        ::selection {
            background-color: var(--usg-navy);
            color: #fff;
        }

        .bg-usg-surface {
            background-color: var(--usg-surface) !important;
        }

        .bg-usg-navy {
            background-color: var(--usg-navy) !important;
        }

        .floating-composer {
            max-width: 56rem;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 30px rgb(0 0 0 / 8%);
            border-radius: 9999px;
            transition: box-shadow 0.2s ease;
        }

        .floating-composer:hover {
            box-shadow: 0 8px 30px rgb(0 0 0 / 12%);
        }

        .chat-input-plain:focus {
            box-shadow: none;
            outline: none;
        }

        .min-w-0 {
            min-width: 0 !important;
        }

        .pointer-events-none {
            pointer-events: none;
        }

        .btn-usg-attach:hover {
            color: var(--usg-navy) !important;
            background-color: #f1f5f9 !important;
        }

        .btn-send-chat:hover {
            background-color: var(--usg-navy-light) !important;
        }

        .btn-send-chat:active {
            transform: scale(0.95);
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
</head>

<body class="bg-usg-surface text-dark h-100 overflow-hidden">
    <!-- BEGIN: AppLayout -->
    <div class="d-flex h-100 w-100 position-relative">
        <!-- BEGIN: Main Content Area -->
        <main class="flex-fill d-flex flex-column min-w-0 bg-usg-surface position-relative">
            <!-- Positioned absolutely at the bottom to float over the chat stream -->
            <div class="position-absolute bottom-0 start-0 end-0 px-4 pb-4 d-flex justify-content-center pointer-events-none"
                style="z-index: 20;">
                <div
                    class="floating-composer w-100 p-2 d-flex align-items-center gap-2"
                    style="pointer-events: auto;">
                    <!-- Attachment Button -->
                    <button type="button"
                        class="btn btn-light rounded-circle p-2 text-secondary border-0 flex-shrink-0 btn-usg-attach">
                        <svg fill="none" height="20" stroke="currentColor" stroke-linecap="round"
                            stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20"
                            xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48">
                            </path>
                        </svg>
                    </button>
                    <!-- Input Field -->
                    <input autocomplete="off"
                        class="form-control border-0 bg-transparent shadow-none flex-fill chat-input-plain text-secondary px-2 min-w-0"
                        style="font-size: 15px;" placeholder="Type a message..." type="text" />
                    <!-- Send Button -->
                    <button type="button"
                        class="btn-send-chat btn rounded-circle p-0 d-flex align-items-center justify-content-center flex-shrink-0 text-white border-0 shadow-sm bg-usg-navy"
                        style="width: 40px; height: 40px;">
                        <svg style="margin-left: 2px;" fill="none" height="18" stroke="currentColor"
                            stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24"
                            width="18" xmlns="http://www.w3.org/2000/svg">
                            <line x1="22" x2="11" y1="2" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
            <!-- END: Floating Message Input -->
        </main>
        <!-- END: Main Content Area -->
    </div>
    <!-- END: AppLayout -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
