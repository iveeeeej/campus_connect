<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - University of Student Government</title>
    <link rel="icon" href="../frontend/assets/logo/usg_logo_transparent.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Symbols:wght@100..900&display=swap');

        * {
            font-family: "Oswald", sans-serif;
            font-weight: 500;
            font-style: normal;
        }

        body {
            background-color: #fbfbfb;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .image-caption-card {
            background-color: #fbfbfb;
            max-width: 800px;
            width: 100%;
            min-height: 650px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .image-caption-card img {
            margin-top: 2rem;
            max-width: 100%;
            height: auto;
            object-fit: contain;
            display: block;
        }

        .image-caption {
            font-size: 3rem;
            text-align: left;
            margin-top: 2rem;
            color: #343a40;
        }

        .image-caption-1 {
            color: #343a40;
        }

        .image-caption-2 {
            color: #1E174A;
        }

        .highlight-text {
            font-size: 3rem;
            font-weight: bold;
            color: #1E174A;
        }

        .login-card {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            max-width: 500px;
            width: 100%;
            min-height: 650px;
        }

        .logo-brand {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        .logo {
            width: 150px;
            height: auto;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .brand-title {
            font-size: 2.5rem;
            line-height: 1.2;
            margin: 0;
        }

        .brand-campus {
            color: #1E174A;
        }

        .brand-connect {
            color: #f9a702;
        }

        .form-control {
            border-radius: 0;
            padding: 0.5rem 0.25rem 0.5rem;
            border: none;
            border-bottom: 2px solid #cfdaceff;
            background-color: transparent;
            box-shadow: none;
            outline: none;
        }

        .form-control:focus {
            border-bottom-color: #1e174a;
            background-color: transparent;
            box-shadow: none;
        }

        .form-check-1 {
            margin-top: 0.5rem;
        }

        .form-check-label {
            font-size: 15px;
            font-weight: 380;
            color: #343a40;
            margin-left: 0.5rem;
        }

        .forgot-password {
            margin-top: 0.5rem;
            font-size: 15px;
            font-weight: 500;
            color: #343a40;
            text-decoration: none;
        }

        .forgot-password:hover {
            color: #007bff;
            text-decoration: underline;
        }

        .btn-login {
            background-color: #1e174a;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.75rem;
            width: 100%;
            font-weight: 500;
            margin-bottom: 1.5rem;
        }

        .btn-login:hover {
            background-color: #261d5c;
        }

        .sign-in-label {
            font-size: 15px;
            font-weight: 380;
            color: #343a40;
        }

        .sign-in {
            font-size: 15px;
            font-weight: 500;
            color: #343a40;
            text-decoration: none;
        }

        .sign-in:hover {
            color: #007bff;
            text-decoration: underline;
        }

        .welcome-text {
            font-size: 2.2rem;
            font-weight: 700;
            color: #343a40;
            margin-top: 2rem;
        }


        .login-feedback {
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
        }

        .login-feedback.hidden {
            display: none;
        }

        .login-feedback.error {
            background: #f8d7da;
            color: #842029;
            border: 1px solid #f1aeb5;
        }

        .login-feedback.success {
            background: #d1e7dd;
            color: #0f5132;
            border: 1px solid #a3cfbb;
        }
        /* Mobile Responsive Styles */
        @media (max-width: 991.98px) {

            .login-card {
                margin-left: auto;
                margin-right: auto;
                margin-top: 0;
                min-height: auto;
                padding: 2rem 1.5rem;
            }

            .col-md-6.d-flex {
                padding: 1rem;
            }
        }

        @media (max-width: 575.98px) {

            .login-card {
                padding: 1.5rem 1rem;
            }

            .logo {
                width: 150px;
            }

            .welcome-text {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row min-vh-100 g-3 align-items-center justify-content-center">

            <div class="col-md-6 d-flex justify-content-center align-items-center">
                <div class="image-caption-card">
                    <img src="../frontend/assets/images/login_img_2.gif" alt="img">
                    <p class="image-caption">
                        <span class="image-caption-1">THE INNOVATORS OF TOMORROW,</span><span class="image-caption-2"> TRAILBLAZERS</span>
                    </p>
                </div>
            </div>


            <div class="col-md-6 d-flex justify-content-end align-items-center">
                <div class="login-card">
                    <!-- Logo & Title -->
                    <div class="logo-brand">
                        <img src="../frontend/assets/logo/campusconnect_logo.png" alt="Logo" class="logo">
                        <p class="brand-title">
                            <span class="brand-campus">Campus</span><span class="brand-connect"> Connect</span>
                        </p>
                    </div>

                    <!-- Login Form -->
                    <form id="loginForm">
                        <div class="mb-3">
                            <h1 class="welcome-text">WELCOME</h1>
                        </div>
                        <div class="login-feedback hidden" id="loginFeedback"></div>
                        <div class="mb-3">
                            <input type="text" class="form-control" id="userName" name="username"
                                placeholder="Username">
                        </div>
                        <div class="mb-3">
                            <input type="password" class="form-control" id="password" name="password"
                                placeholder="Password">
                        </div>
                        <div class="mb-3 d-flex flex-column gap-2">
                            <div class="d-flex justify-content-between align-items-center">
                                <div class="form-check-1">
                                    <input class="form-check-input" type="checkbox" id="rememberMe" name="remember_me">
                                    <label class="form-check-label" for="rememberMe">Remember Me</label>
                                </div>
                                <a href="#" class="forgot-password" id="openForgot">Forgot Password?</a>
                            </div>
                        </div>
                        <button type="submit" class="btn-login" id="loginButton">LOGIN</button>
                        <div class="text-center">
                            <label class="sign-in-label" for="signIN">Don't have an Account?</label>
                            <a href="#" class="sign-in" id="openSign">SIGN IN</a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
    <!-- Bootstrap JS and dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
        </script>
    <script>
        (() => {
            const loginForm = document.getElementById("loginForm");
            const usernameInput = document.getElementById("userName");
            const passwordInput = document.getElementById("password");
            const rememberMeInput = document.getElementById("rememberMe");
            const loginButton = document.getElementById("loginButton");
            const loginFeedback = document.getElementById("loginFeedback");

            const storageKeys = [
                "campusConnectAccessToken",
                "campusConnectRefreshToken",
                "campusConnectUser",
                "accessToken",
                "access_token",
                "access"
            ];

            const getApiBaseUrl = () => {
                const configuredUrl = window.CAMPUS_CONNECT_API_BASE_URL || localStorage.getItem("campusConnectApiBaseUrl");
                if (configuredUrl) {
                    return configuredUrl.replace(/\/$/, "");
                }

                const isDjangoOrigin = ["localhost", "127.0.0.1"].includes(window.location.hostname)
                    && window.location.port === "8000";
                if (isDjangoOrigin) {
                    return window.location.origin;
                }

                return "http://127.0.0.1:8000";
            };

            const showFeedback = (message, type = "error") => {
                loginFeedback.textContent = message;
                loginFeedback.className = `login-feedback ${type}`;
            };

            const clearStoredLogin = () => {
                storageKeys.forEach((key) => {
                    localStorage.removeItem(key);
                    sessionStorage.removeItem(key);
                });
            };

            const saveLogin = (payload) => {
                clearStoredLogin();
                const storage = rememberMeInput.checked ? localStorage : sessionStorage;
                storage.setItem("campusConnectAccessToken", payload.access);
                storage.setItem("campusConnectRefreshToken", payload.refresh);
                storage.setItem("campusConnectUser", JSON.stringify(payload.user));
            };

            const getErrorMessage = async (response) => {
                try {
                    const payload = await response.json();
                    if (typeof payload?.detail === "string") {
                        return payload.detail;
                    }
                    if (typeof payload?.error === "string") {
                        return payload.error;
                    }
                    if (payload?.error?.detail) {
                        return payload.error.detail;
                    }
                } catch (error) {
                    return "Login failed. Please check the backend server and try again.";
                }

                return "Login failed. Please check your username and password.";
            };

            loginForm.addEventListener("submit", async (event) => {
                event.preventDefault();

                const username = usernameInput.value.trim();
                const password = passwordInput.value;

                if (!username || !password) {
                    showFeedback("Please enter your username and password.");
                    return;
                }

                loginButton.disabled = true;
                loginButton.textContent = "LOGGING IN...";
                showFeedback("Checking your account...", "success");

                try {
                    const response = await fetch(`${getApiBaseUrl()}/api/auth/token/`, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({ username, password })
                    });

                    if (!response.ok) {
                        throw new Error(await getErrorMessage(response));
                    }

                    const payload = await response.json();
                    if (payload.user?.role !== "SUPER_ADMIN") {
                        throw new Error("Only the Super Admin dashboard is wired in this step.");
                    }

                    saveLogin(payload);
                    showFeedback("Login successful. Opening Super Admin dashboard...", "success");
                    window.location.href = "pages/super_admin/admin_dashboard.html";
                } catch (error) {
                    clearStoredLogin();
                    showFeedback(error.message || "Login failed. Please try again.");
                    loginButton.disabled = false;
                    loginButton.textContent = "LOGIN";
                }
            });
        })();
    </script>

</body>

</html>
